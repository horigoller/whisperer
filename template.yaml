AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  End-to-end WhatsApp messaging on AWS End User Messaging Social: a send Lambda plus the
  inbound (receive) pipeline — SNS event-destination topic -> SQS (+ DLQ) -> Lambda that
  downloads media to S3, persists to DynamoDB, marks messages read, and fans out to EventBridge.

Parameters:
  OriginationPhoneNumberId:
    Type: String
    Description: >
      The phone-number id of your WABA number linked to AWS End User Messaging Social
      (format "phone-number-id-xxxxxxxx..."). Find it with GetLinkedWhatsAppBusinessAccount.
  MetaApiVersion:
    Type: String
    Default: v21.0
    Description: The Meta Graph API version used to format outgoing messages.
  WabaId:
    Type: String
    Default: ""
    Description: WABA id (waba-...), used by the console to list approved templates.
  BootstrapAdminUsername:
    Type: String
    Default: ""
    Description: Username seeded as the first admin on first login (when no users exist).
  BootstrapAdminPhone:
    Type: String
    Default: ""
    Description: E.164 WhatsApp number for the bootstrap admin's login codes.
  WhispererDomainName:
    Type: String
    Default: ""
    Description: Optional custom domain for the console (e.g. whisperer.e-goller.com).
  WhispererCertArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN (us-east-1) for the custom domain. Required to attach the domain.

Conditions:
  HasWhispererDomain: !And
    - !Not [!Equals [!Ref WhispererDomainName, ""]]
    - !Not [!Equals [!Ref WhispererCertArn, ""]]

Globals:
  Function:
    Runtime: dotnet8
    Architectures:
      - arm64
    MemorySize: 256
    Tracing: Active

Resources:
  # ---------------------------------------------------------------------------
  # Inbound: event destination topic -> queue (+ DLQ) -> processing Lambda
  # ---------------------------------------------------------------------------
  WhatsAppEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: WhatsApp inbound events
      # Point your WABA's event destination at this topic ARN (see Outputs / README).

  WhatsAppInboundDlq:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600 # 14 days

  WhatsAppInboundQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 180 # >= 6x the function timeout
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WhatsAppInboundDlq.Arn
        maxReceiveCount: 5

  WhatsAppInboundQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref WhatsAppInboundQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSnsToSendMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt WhatsAppInboundQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref WhatsAppEventsTopic

  WhatsAppInboundSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref WhatsAppEventsTopic
      Protocol: sqs
      Endpoint: !GetAtt WhatsAppInboundQueue.Arn
      RawMessageDelivery: true

  # ---------------------------------------------------------------------------
  # Storage + fan-out
  # ---------------------------------------------------------------------------
  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: MessageId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: MessageId-index
          KeySchema:
            - AttributeName: MessageId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  WhatsAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-whatsapp-inbound'

  # ---------------------------------------------------------------------------
  # Functions
  # ---------------------------------------------------------------------------
  ReceiveFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/WhatsAppClient.ReceiveLambda/
      Handler: WhatsAppClient.ReceiveLambda
      Timeout: 30
      Environment:
        Variables:
          WhatsApp__OriginationPhoneNumberId: !Ref OriginationPhoneNumberId
          WhatsApp__MetaApiVersion: !Ref MetaApiVersion
          Receive__MessagesTableName: !Ref MessagesTable
          Receive__MediaBucketName: !Ref MediaBucket
          Receive__EventBusName: !Ref WhatsAppEventBus
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref WhatsAppEventBus
        - Statement:
            - Effect: Allow
              Action:
                - social-messaging:SendWhatsAppMessage
                - social-messaging:GetWhatsAppMessageMedia
                - social-messaging:PostWhatsAppMessageMedia
              Resource: '*'
      Events:
        Inbound:
          Type: SQS
          Properties:
            Queue: !GetAtt WhatsAppInboundQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  SendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/WhatsAppClient.Lambda/
      Handler: WhatsAppClient.Lambda
      Timeout: 15
      Environment:
        Variables:
          WhatsApp__OriginationPhoneNumberId: !Ref OriginationPhoneNumberId
          WhatsApp__MetaApiVersion: !Ref MetaApiVersion
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - social-messaging:SendWhatsAppMessage
              Resource: '*'

  AutoReplyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/WhatsAppClient.AutoReplyLambda/
      Handler: WhatsAppClient.AutoReplyLambda
      Timeout: 15
      Environment:
        Variables:
          WhatsApp__OriginationPhoneNumberId: !Ref OriginationPhoneNumberId
          WhatsApp__MetaApiVersion: !Ref MetaApiVersion
          AutoReply__Message: "Thanks for your message! \U0001F44B We've received it and someone from Goller's Whisperer will get back to you shortly."
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - social-messaging:SendWhatsAppMessage
              Resource: '*'
      Events:
        InboundMessage:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref WhatsAppEventBus
            Pattern:
              source:
                - whatsapp.inbound
              detail-type:
                - MessageReceived

  # ---------------------------------------------------------------------------
  # Management console: single-table store, SPA bucket, API + ingest Lambdas
  # ---------------------------------------------------------------------------
  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  AppSessionSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: HS256 signing secret for management-console session JWTs.
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/WhatsAppClient.Api/
      Handler: WhatsAppClient.Api
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          WhatsApp__OriginationPhoneNumberId: !Ref OriginationPhoneNumberId
          WhatsApp__MetaApiVersion: !Ref MetaApiVersion
          App__TableName: !Ref AppTable
          App__WebBucketName: !Ref WebBucket
          App__SessionSecretArn: !Ref AppSessionSecret
          App__WabaId: !Ref WabaId
          App__BootstrapAdminUsername: !Ref BootstrapAdminUsername
          App__BootstrapAdminPhone: !Ref BootstrapAdminPhone
      FunctionUrlConfig:
        AuthType: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
        - S3ReadPolicy:
            BucketName: !Ref WebBucket
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref AppSessionSecret
        - Statement:
            - Effect: Allow
              Action:
                - social-messaging:SendWhatsAppMessage
                - social-messaging:ListWhatsAppMessageTemplates
                - social-messaging:GetWhatsAppMessageTemplate
              Resource: '*'
      Events:
        # $default route (no Path/Method) → the Lambda handles every path, same as the Function URL.
        ProxyAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref ConsoleHttpApi

  # HTTP API in front of the console, for the custom domain whisperer.e-goller.com.
  ConsoleHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

  ConsoleApiDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasWhispererDomain
    Properties:
      DomainName: !Ref WhispererDomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref WhispererCertArn
          EndpointType: REGIONAL

  ConsoleApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasWhispererDomain
    Properties:
      ApiId: !Ref ConsoleHttpApi
      DomainName: !Ref ConsoleApiDomain
      Stage: $default

  AppIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/WhatsAppClient.AppIngestLambda/
      Handler: WhatsAppClient.AppIngestLambda
      Timeout: 30
      Environment:
        Variables:
          App__TableName: !Ref AppTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
      Events:
        Inbound:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref WhatsAppEventBus
            Pattern:
              source:
                - whatsapp.inbound
              detail-type:
                - MessageReceived
                - StatusUpdated

Outputs:
  EventsTopicArn:
    Description: Set this ARN as your WABA's event destination in AWS End User Messaging Social.
    Value: !Ref WhatsAppEventsTopic
  EventBusName:
    Description: EventBridge bus that normalized inbound events are published to.
    Value: !Ref WhatsAppEventBus
  MessagesTableName:
    Value: !Ref MessagesTable
  MediaBucketName:
    Value: !Ref MediaBucket
  InboundQueueUrl:
    Value: !Ref WhatsAppInboundQueue
  InboundDlqUrl:
    Value: !Ref WhatsAppInboundDlq
  SendFunctionName:
    Value: !Ref SendFunction
  ReceiveFunctionName:
    Value: !Ref ReceiveFunction
  AutoReplyFunctionName:
    Value: !Ref AutoReplyFunction
  AppUrl:
    Description: Open this URL to use the management console.
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  ConsoleApiEndpoint:
    Description: API Gateway HTTP API endpoint for the console.
    Value: !GetAtt ConsoleHttpApi.ApiEndpoint
  WhispererDomainTarget:
    Condition: HasWhispererDomain
    Description: CNAME target to set at your DNS provider for the custom domain.
    Value: !GetAtt ConsoleApiDomain.RegionalDomainName
  WebBucketName:
    Description: Sync the built React app here (app/deploy-web.sh).
    Value: !Ref WebBucket
  AppTableName:
    Value: !Ref AppTable
